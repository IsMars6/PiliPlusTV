name: Build For TV

on:
  workflow_dispatch:
    inputs:
      build_tv:
        description: "Build TV Android"
        required: false
        default: true
        type: boolean

      tag:
        description: "版本号（例如：v1.0.0，填写后将自动创建 Release）"
        required: false
        default: ""
        type: string

jobs:
  tv:
    if: ${{ github.event.inputs.build_tv == 'true' }}
    name: Release TV Android
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - name: 代码迁出
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 构建Java环境
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"
          cache-dependency-path: |
            android/*.gradle*
            android/**/gradle-wrapper.properties

      - name: 安装Flutter
        uses: subosito/flutter-action@v2
        id: flutter-action
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
          cache: true

      - name: Apply Patch
        shell: pwsh
        run: lib/scripts/patch.ps1 android
        continue-on-error: true

      - name: Write key
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ ! -z "${{ secrets.SIGN_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.SIGN_KEYSTORE_BASE64 }}" | base64 --decode > android/app/key.jks
            echo storeFile='key.jks' >> android/key.properties
            echo storePassword='${{ secrets.KEYSTORE_PASSWORD }}' >> android/key.properties
            echo keyAlias='${{ secrets.KEY_ALIAS }}' >> android/key.properties
            echo keyPassword='${{ secrets.KEY_PASSWORD }}' >> android/key.properties
          fi

      - name: Set and Extract version
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: pwsh
        run: lib/scripts/build.ps1 android

      - name: Flutter Build TV Release Apk
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: flutter build apk --release --flavor tv --split-per-abi --dart-define-from-file=pili_release.json --pub

      - name: Rename
        run: |
          for file in build/app/outputs/flutter-apk/app-tv-release-*.apk; do
            abi=$(echo "$file" | sed -E 's|.*app-tv-release-(.*)\.apk|\1|')
            mv "$file" "PiliPlus_TV_${{ env.version }}_${abi}.apk"
          done
        shell: bash

      - name: Release
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: "PiliPlus TV ${{ github.event.inputs.tag }}"
          files: PiliPlus_TV_*.apk

      - name: 上传 arm64-v8a
        uses: actions/upload-artifact@v7
        with:
          archive: false
          name: TV_arm64-v8a
          path: PiliPlus_TV_*_arm64-v8a.apk

      - name: 上传 armeabi-v7a
        uses: actions/upload-artifact@v7
        with:
          archive: false
          name: TV_armeabi-v7a
          path: PiliPlus_TV_*_armeabi-v7a.apk

      - name: 上传 x86_64
        uses: actions/upload-artifact@v7
        with:
          archive: false
          name: TV_x86_64
          path: PiliPlus_TV_*_x86_64.apk

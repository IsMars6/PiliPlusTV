name: Build TV

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths-ignore:
      - "**.md"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release Tag"
        required: false
        default: ""

jobs:
  android_tv:
    name: Build Android TV APK
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Set version
        run: echo "version=TV-$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV

      # 关键修复：加上 --no-tree-shake-icons 避免打包异常
      - name: Flutter build APK
        run: |
          flutter build apk \
            --release \
            --split-per-abi \
            --no-tree-shake-icons

      # 搜索所有生成的 APK（不管路径在哪）
      - name: Find all apks
        run: find . -name "*.apk"

      # 统一复制到根目录并重命名
      - name: Copy and rename APKs
        run: |
          mkdir -p dist
          find build/app/outputs/flutter-apk -name "app-*-release.apk" -exec cp {} dist/ \;
          
          cd dist
          for apk in *.apk; do
            abi=$(echo "$apk" | sed -E 's/app-(.+)-release\.apk/\1/')
            mv "$apk" "../PiliPlus_TV_${{ env.version }}_${abi}.apk"
          done

      # 上传
      - name: Upload APKs
        uses: actions/upload-artifact@v7
        with:
          name: PiliPlus_TV_APKs
          path: PiliPlus_TV_*.apk

      # Release
      - name: Create GitHub Release
        if: ${{ github.event.inputs.tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          files: PiliPlus_TV_*.apk

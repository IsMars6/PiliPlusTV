name: Build TV

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths-ignore:
      - "**.md"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release Tag"
        required: false
        default: ""

jobs:
  android_tv:
    name: Build Android TV APK
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Set version
        run: echo "version=TV-$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV

      # 关键修复：不用 flutter build，直接 gradle  assembleRelease，稳出 APK
      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace

      # 列出所有生成的 APK，确保能找到
      - name: List all apks
        run: find build -name "*.apk"

      # 复制并重命名到根目录
      - name: Rename & copy APKs
        run: |
          mkdir -p output
          cp build/app/outputs/apk/release/*.apk output/
          cd output
          for f in *.apk; do
            mv "$f" "../PiliPlus_TV_${{ env.version }}_$f"
          done

      # 上传
      - name: Upload all APKs
        uses: actions/upload-artifact@v7
        with:
          name: PiliPlus_TV_APKs
          path: PiliPlus_TV_*.apk

      # Release
      - name: Create Release
        if: ${{ github.event.inputs.tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          files: PiliPlus_TV_*.apk

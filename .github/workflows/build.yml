name: Build TV

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths-ignore:
      - "**.md"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release Tag"
        required: false
        default: ""

jobs:
  android_tv:
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' }}
    name: Build Android TV
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"
          cache-dependency-path: |
            android/*.gradle*
            android/**/gradle-wrapper.properties

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        id: flutter
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Set version
        if: github.event_name == 'workflow_dispatch'
        run: echo "version=TV-$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV

      - name: Build Release APK
        if: github.event_name == 'workflow_dispatch'
        run: |
          flutter build apk \
            --release \
            --split-per-abi \
            --no-tree-shake-icons

      - name: Build Dev APK
        if: github.event_name == 'pull_request'
        run: |
          flutter build apk \
            --release \
            --split-per-abi \
            --no-tree-shake-icons \
            --dart-define=dev=1

      - name: Rename
        run: |
          mkdir -p dist
          for file in build/app/outputs/flutter-apk/app-*-release.apk; do
            abi=$(echo "$file" | sed -E 's|.*app-(.*)-release\.apk|\1|')
            mv "$file" "PiliPlus_TV_${{ env.version }}_${abi}.apk"
          done

      - name: Upload arm64-v8a
        uses: actions/upload-artifact@v7
        with:
          name: Android_TV_arm64-v8a
          path: PiliPlus_TV_*_arm64-v8a.apk

      - name: Upload armeabi-v7a
        uses: actions/upload-artifact@v7
        with:
          name: Android_TV_armeabi-v7a
          path: PiliPlus_TV_*_armeabi-v7a.apk

      - name: Upload x86_64
        uses: actions/upload-artifact@v7
        with:
          name: Android_TV_x86_64
          path: PiliPlus_TV_*_x86_64.apk

      - name: Create Release
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          files: PiliPlus_TV_*.apk

name: Build TV

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths-ignore:
      - "**.md"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release Tag (可选，填了则发Release)"
        required: false
        default: ""

jobs:
  android_tv:
    name: Build Android TV APK
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      # 自定义版本号
      - name: Set build version
        run: echo "version=TV-$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV

      # 构建 APK（按 ABI 拆分）
      - name: Build Android TV APK
        run: |
          flutter build apk \
            --release \
            --split-per-abi \
            --target-platform android-arm,android-arm64,android-x64

      # 查看生成的文件（调试用）
      - name: List generated apks
        run: ls -la build/app/outputs/flutter-apk/

      # 重命名成你要的 PiliPlus_TV_xxx 格式
      - name: Rename APKs
        run: |
          cd build/app/outputs/flutter-apk
          for apk in app-*-release.apk; do
            abi=$(echo "$apk" | sed -E 's/app-(.*)-release\.apk/\1/')
            mv "$apk" "../../../PiliPlus_TV_${{ env.version }}_${abi}.apk"
          done

      # 上传三个架构
      - name: Upload arm64-v8a
        uses: actions/upload-artifact@v7
        with:
          name: PiliPlus_TV_arm64-v8a
          path: PiliPlus_TV_*_arm64-v8a.apk

      - name: Upload armeabi-v7a
        uses: actions/upload-artifact@v7
        with:
          name: PiliPlus_TV_armeabi-v7a
          path: PiliPlus_TV_*_armeabi-v7a.apk

      - name: Upload x86_64
        uses: actions/upload-artifact@v7
        with:
          name: PiliPlus_TV_x86_64
          path: PiliPlus_TV_*_x86_64.apk

      # 填 tag 就自动发 Release
      - name: Create GitHub Release
        if: ${{ github.event.inputs.tag != '' }}
        uses: softprops/gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          files: PiliPlus_TV_*.apk

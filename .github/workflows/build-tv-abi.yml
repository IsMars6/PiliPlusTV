name: Build TV (Multi-ABI)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release Tag (如 v1.0.0)"
        required: false
        default: ""

jobs:
  android_tv:
    name: Build Android TV (Multi-ABI)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Remove Android directory
        run: rm -rf android

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create Android project
        run: |
          flutter create --org com.example --project-name piliplus .

      - name: Modify package name, app label and version
        run: |
          # 修改包名
          sed -i 's/com.example.piliplus/com.example.piliplus.tv/g' android/app/src/main/AndroidManifest.xml
          sed -i 's/com.example.piliplus/com.example.piliplus.tv/g' android/app/build.gradle.kts
          # 修改应用名称
          sed -i 's/android:label="piliplus"/android:label="PiliPlus TV"/g' android/app/src/main/AndroidManifest.xml
          # 修改版本号 (使用Flutter的dart-defines)
          VERSION=${{ github.event.inputs.tag || 'dev' }}
          flutter build apk --release --split-per-abi --dart-define=VERSION=$VERSION

      - name: Rename APKs
        run: |
          VERSION=${{ github.event.inputs.tag || 'dev' }}
          for file in build/app/outputs/flutter-apk/app-*-release.apk; do
            abi=$(echo "$file" | sed -E 's|.*app-(.*)-release\.apk|\1|')
            mv "$file" "PiliPlus_TV_${VERSION}_${abi}.apk"
          done

      - name: Upload arm64-v8a
        uses: actions/upload-artifact@v7
        with:
          name: PiliPlus_TV_arm64-v8a
          path: PiliPlus_TV_*_arm64-v8a.apk

      - name: Upload armeabi-v7a
        uses: actions/upload-artifact@v7
        with:
          name: PiliPlus_TV_armeabi-v7a
          path: PiliPlus_TV_*_armeabi-v7a.apk

      - name: Upload x86_64
        uses: actions/upload-artifact@v7
        with:
          name: PiliPlus_TV_x86_64
          path: PiliPlus_TV_*_x86_64.apk

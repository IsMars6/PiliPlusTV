name: Build For TV

于:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths-ignore:
      - "**.md"
  workflow_dispatch:
    inputs:
      build_android:
        description: "Build For TV"
        required: false
        默认: true
        输入: boolean

      tag:
        description: "版本号(例如v1.0，填写将创建Release)"
        required: false
        默认: ""
        输入: string

jobs:
  android:
    if: ${{ (github.event_name == 'pull_request' && github.repository == 'bggRGjQaUbCoE/PiliPlus') || github.event.inputs.build_android == 'true' }}
    name: Release Android
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - name: 代码迁出
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 构建Java环境
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"
          cache-dependency-path: |
            android/*.gradle*
            android/**/gradle-wrapper.properties

      - name: 安装Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
          cache: true

      - name: Apply Patch
        shell: pwsh
        run: lib/scripts/patch.ps1 android
        continue-on-error: true

      # 👇 这里是修复重点：无缩进EOF，避免语法错误
      - name: Write key
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ -n "${{ secrets.SIGN_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.SIGN_KEYSTORE_BASE64 }}" | base64 --decode > android/app/key.jks
            cat > android/key.properties <<EOF
storeFile=key.jks
storePassword=${{ secrets.KEYSTORE_PASSWORD }}
keyAlias=${{ secrets.KEY_ALIAS }}
keyPassword=${{ secrets.KEY_PASSWORD }}
EOF
          fi

      - name: Set and Extract version
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: lib/scripts/build.ps1 android

      - name: Flutter Build Release Apk
        if: github.event_name == 'workflow_dispatch'
        run: flutter build apk --release --split-per-abi --dart-define-from-file=pili_release.json --pub

      - name: Flutter Build Dev Apk
        if: github.event_name == 'pull_request'
        run: |
          flutter build apk --release --split-per-abi --android-project-arg dev=1 --pub

      # 👇 增加文件存在判断，防止找不到apk报错
      - name: Rename
        run: |
          cd build/app/outputs/flutter-apk
          for file in app-*-release.apk; do
            if [ -f "$file" ]; then
              abi=$(echo "$file" | sed -E 's|.*app-(.*)-release\.apk|\1|')
              mv -v "$file" "../../../PiliPlus_android_${{ env.version }}_${abi}.apk"
            fi
          done
        shell: bash

      - name: Release
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: ${{ github.event.inputs.tag }}
          文件: PiliPlus_android_*.apk

      - name: 上传 arm64-v8a
        uses: actions/upload-artifact@v7
        with:
          archive: false
          name: Android_arm64-v8a
          path: PiliPlus_android_*_arm64-v8a.apk

      - name: 上传 armeabi-v7a
        uses: actions/upload-artifact@v7
        with:
          archive: false
          name: Android_armeabi-v7a
          path: PiliPlus_android_*_armeabi-v7a.apk

      - name: 上传 x86_64
        uses: actions/upload-artifact@v7
        with:
          archive: false
          name: Android_x86_64
          path: PiliPlus_android_*_x86_64.apk
